<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password - ReWordify</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT@9..144,500..800,50&family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/auth.css" />
</head>
<body class="auth-page">
  <main class="auth-shell">
    <section class="auth-hero">
      <div class="auth-topline">
        <a class="back-link" href="/login">Back</a>
        <a class="auth-brand" href="/">ReWordify</a>
      </div>
      <span class="auth-badge">Set new password</span>
      <h1>Create a new password for your account.</h1>
      <p>Use a strong password and keep it private. This reset link works once and expires automatically.</p>
    </section>

    <section class="auth-card">
      <h2>Reset Password</h2>
      <p>Enter your new password to complete account recovery.</p>
      <form id="resetForm" class="auth-form">
        <div class="auth-field">
          <label for="newPassword">New password</label>
          <input id="newPassword" name="newPassword" type="password" autocomplete="new-password" minlength="8" required />
        </div>
        <div class="auth-field">
          <label for="confirmPassword">Confirm password</label>
          <input id="confirmPassword" name="confirmPassword" type="password" autocomplete="new-password" minlength="8" required />
        </div>
        <button class="auth-action" type="submit">Reset password</button>
      </form>
      <div id="resetStatus" class="auth-status"></div>
      <div class="auth-footer"><a href="/login">Back to login</a></div>
    </section>
  </main>

  <script src="/static/reset-password.js"></script>
</body>
</html>
