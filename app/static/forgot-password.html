<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password - ReWordify</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT@9..144,500..800,50&family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/auth.css" />
</head>
<body class="auth-page">
  <main class="auth-shell">
    <section class="auth-hero">
      <div class="auth-topline">
        <a class="back-link" href="/login">Back</a>
        <a class="auth-brand" href="/">ReWordify</a>
      </div>
      <span class="auth-badge">Account recovery</span>
      <h1>Reset your password securely.</h1>
      <p>Enter your account email and we will guide you through resetting your password.</p>
    </section>

    <section class="auth-card">
      <h2>Forgot Password</h2>
      <p>Provide your email to request a password reset.</p>
      <form id="forgotForm" class="auth-form">
        <div class="auth-field">
          <label for="resetEmail">Email</label>
          <input id="resetEmail" name="resetEmail" type="email" autocomplete="email" required />
        </div>
        <button class="auth-action" type="submit">Request reset</button>
      </form>
      <div id="forgotStatus" class="auth-status"></div>
      <div class="auth-footer"><a href="/login">Back to login</a></div>
    </section>
  </main>

  <script src="/static/forgot-password.js"></script>
</body>
</html>
